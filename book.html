<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Your Growth Call | eCon Growth</title>
<meta name="description" content="Schedule a 30-minute Growth Call with eCon Growth — directly in our calendar.">
<link rel="icon" type="image/png" href="assets/images/favicon.png">

<!-- Hard redirect to Google Calendar appointment schedule. -->
<meta http-equiv="refresh" content="0; url=https://calendar.google.com/calendar/u/0/appointments/schedules/AcZssZ3khckBGlQLchkKyAf1147FV-Gs8-chBC1962lejQqBqF-XPi5scHjgPeXI_yYQ9av-kpxjCsMC">
<link rel="canonical" href="https://calendar.google.com/calendar/u/0/appointments/schedules/AcZssZ3khckBGlQLchkKyAf1147FV-Gs8-chBC1962lejQqBqF-XPi5scHjgPeXI_yYQ9av-kpxjCsMC">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#070A0F;--bg2:#0A0E15;--green:#21E68A;--text:#EAF0FF;--mu:rgba(234,240,255,.55);--mu2:rgba(234,240,255,.32);--bd:rgba(234,240,255,.06);--gd:rgba(33,230,138,.08);--gb:rgba(33,230,138,.18)}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;line-height:1.5;text-align:center}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(33,230,138,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(33,230,138,.022) 1px,transparent 1px);background-size:56px 56px;pointer-events:none;z-index:0}
.orb{position:fixed;width:900px;height:900px;background:radial-gradient(circle,rgba(33,230,138,.06) 0%,transparent 60%);top:-300px;right:-200px;filter:blur(90px);border-radius:50%;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:520px;width:100%}
.logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:36px;text-decoration:none;color:var(--text)}
.logo-dot{width:8px;height:8px;background:var(--green);border-radius:50%;box-shadow:0 0 10px rgba(33,230,138,.6);animation:pd 2.2s infinite}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.5px}
.logo-text .c{color:var(--green)}
@keyframes pd{0%,100%{box-shadow:0 0 6px rgba(33,230,138,.4),0 0 0 0 rgba(33,230,138,.4)}50%{box-shadow:0 0 14px rgba(33,230,138,.4),0 0 0 8px rgba(33,230,138,0)}}
.badge{display:inline-flex;align-items:center;gap:8px;background:var(--gd);border:1px solid var(--gb);border-radius:4px;padding:6px 14px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--green);letter-spacing:.14em;text-transform:uppercase;margin-bottom:24px}
.badge-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pd 2s infinite}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(38px,6vw,58px);letter-spacing:1px;line-height:.95;margin-bottom:18px}
h1 .green{color:var(--green)}
.body{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--mu);line-height:1.85;margin-bottom:32px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;background:var(--green);color:#070A0F;font-family:'Syne',sans-serif;font-weight:700;font-size:16px;padding:18px 32px;border-radius:10px;text-decoration:none;box-shadow:0 0 32px rgba(33,230,138,.3);transition:all .25s;letter-spacing:.4px}
.btn:hover{background:#fff;transform:translateY(-2px);box-shadow:0 0 56px rgba(33,230,138,.45)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(7,10,15,.25);border-top-color:#070A0F;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fallback{margin-top:24px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mu2);line-height:1.7}
.fallback a{color:var(--green);text-decoration:none}
.fallback a:hover{text-decoration:underline}
.home{margin-top:36px;display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mu2);text-decoration:none;letter-spacing:.08em;text-transform:uppercase}
.home:hover{color:var(--green)}
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <a href="index.html" class="logo">
    <span class="logo-dot"></span>
    <span class="logo-text">e<span class="c">C</span>on Growth</span>
  </a>
  <div class="badge"><span class="badge-dot"></span>Booking · Live Calendar</div>
  <h1>OPENING YOUR<br><span class="green">GROWTH CALL CALENDAR…</span></h1>
  <p class="body">You're being sent to our live booking calendar. If it doesn't open in 2 seconds, tap the button below.</p>
  <a id="bookBtn" class="btn" href="https://calendar.google.com/calendar/u/0/appointments/schedules/AcZssZ3khckBGlQLchkKyAf1147FV-Gs8-chBC1962lejQqBqF-XPi5scHjgPeXI_yYQ9av-kpxjCsMC">
    <span class="spin"></span>
    Open Booking Calendar →
  </a>
  <div class="fallback">
    Calendar not loading? Call us directly at <a href="tel:6156649178">(615) 664-9178</a>.
  </div>
  <a href="index.html" class="home">← Back to Home</a>
</div>
<script>
/* Belt and suspenders: meta-refresh handles the redirect, but trigger an
   immediate JS redirect too in case meta is blocked or slow. Use replace()
   so the back button returns the visitor to the previous page on the site,
   not to this stub page. */
(function(){
  var url = 'https://calendar.google.com/calendar/u/0/appointments/schedules/AcZssZ3khckBGlQLchkKyAf1147FV-Gs8-chBC1962lejQqBqF-XPi5scHjgPeXI_yYQ9av-kpxjCsMC';
  try { window.location.replace(url); } catch(e) { window.location.href = url; }
})();
</script>
</body>
</html>
